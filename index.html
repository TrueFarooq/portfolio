<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Perfect Pyramid</title>
    <style>
        /* CSS Styles */
        body {
            font-family: Arial, sans-serif;
            background-color: #E6DCD2; /* Match photo colors */
            color: #4A3C2A; /* Dark brown from photo */
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        /* Image styling */
        .header-image {
            width: 100%;
            max-width: 600px;
            height: auto;
            border: 2px solid #9C8C7C;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        /* Styling for the text underneath the photo */
        .welcome-text {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        /* Container for the navigation buttons */
        .nav-container {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        /* Base styling for all navigation buttons */
        .nav-button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #A36B4E; /* Terracotta from image */
            color: white;
            text-decoration: none; /* Make links look like buttons */
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        /* Hover effect for buttons */
        .nav-button:hover {
            background-color: #8D5A41; /* Darker terracotta on hover */
        }
    </style>
</head>
<body>

    <!-- Link the provided photo -->
    <img src="Pyramid.png" alt="The Perfect Pyramid" class="header-image">

    <!-- The requested text under the image -->
    <div class="welcome-text">Welcome!</div>

    <!-- The required clickable links -->
    <div class="nav-container">
        <a href="#about" class="nav-button">ABOUT US</a>
        <a href="#apply" class="nav-button">APPLY NOW</a>
        <a href="#contact" class="nav-button">CONTACT</a>
    </div>

</body>
</html>
